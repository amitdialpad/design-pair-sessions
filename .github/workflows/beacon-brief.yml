name: Beacon Brief

on:
  schedule:
    # Monday 4:30 AM UTC = 10 AM IST
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Beacon Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_PAIR_SESSIONS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIALPAD_BEARER_TOKEN: ${{ secrets.DIALPAD_BEARER_TOKEN }}
        id: brief
        run: python3 scripts/generate-brief.py
        continue-on-error: true

      - name: Commit and push
        if: steps.brief.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git diff --cached --quiet || git commit -m "beacon-brief: week of $(date -u +'%-d %b %Y')"
          git pull --rebase && git push

      - name: Trigger site deploy
        if: steps.brief.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --repo amitdialpad/design-pair-sessions

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify-failure.py
