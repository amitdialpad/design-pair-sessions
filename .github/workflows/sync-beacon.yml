name: Sync Beacon Toolkit

on:
  schedule:
    # Run daily at 9 AM UTC (2 AM PT / 2:30 PM IST)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Beacon .claude/ changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/sync-check.sh
        continue-on-error: true
        id: sync

      - name: Commit and push if changes found
        if: steps.sync.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md scripts/manifest.json
          git diff --cached --quiet || git commit -m "sync: beacon toolkit changes detected $(date -u +%Y-%m-%d)"
          git pull --rebase && git push

      - name: Trigger site deploy
        if: steps.sync.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --repo amitdialpad/design-pair-sessions
