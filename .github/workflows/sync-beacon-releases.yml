name: Sync Beacon Releases

on:
  schedule:
    # Run daily at 9:30 AM UTC (3 PM IST) — staggered from other syncs
    - cron: '30 9 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and sync Beacon releases
        env:
          GH_TOKEN: ${{ secrets.BEACON_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_PAIR_SESSIONS }}
        id: sync
        run: python3 scripts/sync-releases.py
        continue-on-error: true

      - name: Commit and push if updated
        if: steps.sync.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/whats-new.md scripts/last-beacon-release.json
          git diff --cached --quiet || git commit -m "sync: beacon releases updated $(date -u +%Y-%m-%d)"
          git pull --rebase && git push

      - name: Trigger site deploy
        if: steps.sync.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --repo amitdialpad/design-pair-sessions
